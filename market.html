<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daba Delivery System</title>
    <style>
        :root { --p: #ff4757; --s: #2f3542; --bg: #f1f2f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        .status { padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 15px; }
        .open { background: #dff9fb; color: #0984e3; }
        .closed { background: #fab1a0; color: #d63031; }
        .product { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 10px 0; }
        .btn { background: var(--p); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; }
        .admin { margin-top: 30px; padding: 15px; border: 1px dashed #ccc; border-radius: 10px; background: #fafafa; }
        input, select { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .cart-badge { background: var(--p); color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚀 Доставка Эль-Даба <span id="cart-count" class="cart-badge">0</span></h2>
    <div id="status-box" class="status">Загрузка...</div>

    <div id="menu-area"></div>

    <div id="order-form" style="display:none; margin-top:20px;">
        <hr>
        <h4>Оформление</h4>
        <input type="text" id="cust-addr" placeholder="Адрес (Дом, квартира)">
        <select id="cust-pay">
            <option value="Наличные">Наличные</option>
            <option value="InstaPay">InstaPay</option>
        </select>
        <label><input type="checkbox" id="cust-door"> До двери</label>
        <button class="btn" onclick="checkout()">Заказать</button>
    </div>

    <div class="admin">
        <h4>🔐 Управление (Для тебя)</h4>
        <input type="password" id="gh-token" placeholder="GitHub Token (Classic)">
        <button onclick="toggleStore()" style="background:#2f3542; color:white; width:100%; border-radius:5px; padding:5px;">Вкл/Выкл Магазин</button>
        <div style="margin-top:10px;">
            <input type="text" id="p-name" placeholder="Название">
            <input type="number" id="p-price" placeholder="Цена">
            <button onclick="addNewProduct()" style="width:100%;">Добавить товар</button>
        </div>
    </div>
</div>

<script>
    // КОНФИГУР ПУТЬ
    const OWNER = 'matveisem4-dot'; 
    const REPO = 'MadinaMarket';
    const PATH = 'database.json';

    let db = { isWorking: true, products: [] };
    let cart = [];

    // 1. ЗАГРУЗКА ИЗ GITHUB
    async function loadDB() {
        try {
            const r = await fetch(`https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${PATH}?nocache=${Date.now()}`);
            db = await r.json();
            render();
        } catch (e) { console.error("Ошибка загрузки"); }
    }

    function render() {
        const statusBox = document.getElementById('status-box');
        const menu = document.getElementById('menu-area');
        const orderForm = document.getElementById('order-form');

        if (!db.isWorking) {
            statusBox.className = "status closed";
            statusBox.innerText = "⚡ Самокат на зарядке. Зайдите через 2 часа";
            menu.innerHTML = "";
            orderForm.style.display = "none";
        } else {
            statusBox.className = "status open";
            statusBox.innerText = "✅ Магазин открыт!";
            orderForm.style.display = "block";
            menu.innerHTML = db.products.map((p, i) => `
                <div class="product">
                    <span>${p.name} - <b>${p.price} EGP</b></span>
                    <button onclick="addToCart(${i})">+</button>
                </div>
            `).join('');
        }
        document.getElementById('cart-count').innerText = cart.length;
    }

    function addToCart(i) {
        cart.push(db.products[i]);
        render();
    }

    // 2. СОХРАНЕНИЕ В GITHUB (API)
    async function saveDB() {
        const token = document.getElementById('gh-token').value;
        if (!token) return alert("Введите токен!");

        const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`;
        
        // Получаем SHA
        const fileData = await fetch(url).then(r => r.json());
        
        const response = await fetch(url, {
            method: 'PUT',
            headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: "update db",
                content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2)))),
                sha: fileData.sha
            })
        });

        if (response.ok) { alert("Успешно сохранено!"); loadDB(); }
        else { alert("Ошибка! Проверь токен."); }
    }

    function toggleStore() {
        db.isWorking = !db.isWorking;
        saveDB();
    }

    function addNewProduct() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        if (name && price) {
            db.products.push({ name, price: parseInt(price) });
            saveDB();
        }
    }

    function checkout() {
        const addr = document.getElementById('cust-addr').value;
        if (!addr || cart.length === 0) return alert("Корзина пуста или нет адреса!");
        
        let text = `Заказ из Эль-Дабы!%0A%0A` + 
                   cart.map(c => `- ${c.name}`).join('%0A') + 
                   `%0A%0A📍 Адрес: ${addr}%0A💳 Оплата: ${document.getElementById('cust-pay').value}`;
        
        // Открываем WhatsApp (номер замени на свой)
        window.open(`https://wa.me/201000000000?text=${text}`);
        cart = [];
        render();
    }

    loadDB();
</script>
</body>
</html>
